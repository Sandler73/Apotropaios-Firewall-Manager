# ==============================================================================
# Apotropaios - Firewall Manager Configuration
# File: conf/apotropaios.conf
# Description: Default configuration values for the framework.
#              Copy to /etc/apotropaios/apotropaios.conf for system-wide config.
# ==============================================================================

# Logging
LOG_LEVEL=DEBUG
LOG_DIR=data/logs
LOG_MAX_SIZE_MB=100
LOG_MAX_FILES=10

# Default firewall backend (auto-detected if empty)
DEFAULT_BACKEND=

# Backup settings
BACKUP_DIR=data/backups
BACKUP_MAX_RETAINED=20

# Rule settings
RULES_DIR=data/rules
RULE_DEFAULT_DURATION=permanent

# Security
LOCK_TIMEOUT=30
